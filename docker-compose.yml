version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    container_name: property_mgmt_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: property_management
      POSTGRES_USER: prop_mgmt_user
      POSTGRES_PASSWORD: changeme123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prop_mgmt_user -d property_management"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: property_mgmt_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@propertymanager.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  app_network:
    driver: bridge
